name: taramux
include:
  - path: ./taracert/compose.yml
services:
  dyndns:
    build: dyndns
    volumes:
      - ./dyndns/settings.txt:/settings.txt
    networks:
      default:
        aliases:
          - taramux-dyndns
    restart: always

  frontend:
    build: frontend
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.240
        aliases:
          - taramux-frontend
    restart: always

  nginx:
    build: nginx
    depends_on:
      certbot:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - certbot-www:/web:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:z
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
    ports:
      - '${HTTP_BIND:-}:${HTTP_PORT:-80}:80'
      - '${HTTPS_BIND:-}:${HTTPS_PORT:-443}:443'
    networks:
      default:
        aliases:
          - taramux-nginx
      lesjardinsdudore:
      taralists:
      taramail:
      tarameteo:
      taramonit:
      tarawiki:
    restart: always

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    depends_on:
      nginx:
        condition: service_started
    networks:
      default:
        aliases:
          - taramux-nginx-exporter
    command:
      - '-nginx.scrape-uri=http://taramux-nginx:8080/nginx_status'
    restart: always

  ipv6nat:
    image: robbertkl/ipv6nat:0.4.4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /lib/modules:/lib/modules:ro
    network_mode: "host"
    restart: always
    privileged: true
    security_opt:
      - label=disable

  prometheus:
    image: prom/prometheus:v3.11.2
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      default:
        aliases:
          - taramux-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    restart: always

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-taramux
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.22.2}.0/24
        - subnet: ${IPV6_NETWORK:-fd4d:6169:6c63:6f78::/64}
  lesjardinsdudore:
    external: true
    name: lesjardinsdudore_default
  taralists:
    external: true
    name: taralists_default
  taramail:
    external: true
    name: taramail_default
  tarameteo:
    external: true
    name: tarameteo_default
  taramonit:
    external: true
    name: taramonit_default
  tarawiki:
    external: true
    name: tarawiki_default

volumes:
  prometheus-data:
